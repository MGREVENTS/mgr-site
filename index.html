<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--noir:#0A0A0A;--blanc:#F5F0EB;--or:#C9A84C;--bordeaux:#6B0F1A;--gris:#1A1A1A;--gris2:#2A2A2A;--gris-texte:#999;--border-subtle:rgba(255,255,255,.05);--border-accent:rgba(201,168,76,.08);--nav-bg:rgba(10,10,10,.78);--overlay-bg:rgba(0,0,0,.7);--ff-display:'Playfair Display',Georgia,serif;--ff-body:'DM Sans',system-ui,sans-serif}
[data-theme="light"]{--noir:#F5F0EB;--blanc:#1A1A1A;--gris:#E8E3DD;--gris2:#D5D0CA;--gris-texte:#666;--border-subtle:rgba(0,0,0,.08);--border-accent:rgba(201,168,76,.15);--nav-bg:rgba(245,240,235,.85);--overlay-bg:rgba(255,255,255,.8)}
html{scroll-behavior:smooth}body{background:var(--noir);color:var(--blanc);font-family:var(--ff-body);overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}a{color:inherit;text-decoration:none}
.theme-toggle{background:none;border:1px solid rgba(201,168,76,.2);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;margin-right:.5rem}
.theme-toggle:hover{border-color:var(--or);background:rgba(201,168,76,.08)}
.theme-toggle svg{width:16px;height:16px}
[data-theme="light"] .nav-logo img{filter:none}
[data-theme="light"] .footer-brand img{filter:none}
[data-theme="light"] .hero::before{background:radial-gradient(ellipse at 50% 85%,rgba(201,168,76,.08) 0%,transparent 55%)}
[data-theme="light"] .brand-card{border-color:rgba(0,0,0,.1)}
[data-theme="light"] .brand-card .brand-content{color:#F5F0EB !important}
[data-theme="light"] .brand-card .brand-name{color:#F5F0EB !important}
[data-theme="light"] .brand-card .brand-label{color:var(--or) !important}
[data-theme="light"] .brand-card .brand-desc{color:rgba(245,240,235,.7) !important}
[data-theme="light"] .brand-card .brand-link{color:var(--or) !important}
[data-theme="light"] .brand-modal{background:#0A0A0A;color:#F5F0EB}
[data-theme="light"] .brand-modal .bm-tag{color:var(--or)}
[data-theme="light"] .brand-modal h2{color:#F5F0EB !important}
[data-theme="light"] .brand-modal h2 em{color:var(--or) !important}
[data-theme="light"] .brand-modal p{color:#999 !important}
[data-theme="light"] .brand-modal .bm-feature{border-color:rgba(255,255,255,.04)}
[data-theme="light"] .brand-modal .bm-feature h4{color:#F5F0EB !important}
[data-theme="light"] .brand-modal .bm-feature p{color:#999 !important}
[data-theme="light"] .brand-modal .bm-stat-num{color:var(--or)}
[data-theme="light"] .brand-modal .bm-stat-label{color:#999}
[data-theme="light"] .brand-modal .bm-cta h3{color:#F5F0EB !important}
[data-theme="light"] .brand-modal .bm-cta p{color:#999 !important}
[data-theme="light"] .brand-modal .bm-back{color:#F5F0EB;background:rgba(0,0,0,.7);border-color:rgba(255,255,255,.15)}
[data-theme="light"] .brand-modal .bm-back:hover{color:var(--or);border-color:rgba(201,168,76,.3)}
[data-theme="light"] .modal{background:#E8E3DD;border-color:rgba(201,168,76,.2)}
[data-theme="light"] .modal h3{color:#1A1A1A}
[data-theme="light"] .modal label{color:#666}
[data-theme="light"] .form-row input,[data-theme="light"] .form-row select,[data-theme="light"] .form-row textarea{background:rgba(255,255,255,.6);border-color:rgba(0,0,0,.1);color:#1A1A1A}
[data-theme="light"] .dj-card{border-color:rgba(0,0,0,.08)}
[data-theme="light"] .dj-card:hover{border-color:rgba(201,168,76,.4)}
[data-theme="light"] .form-row input,[data-theme="light"] .form-row select,[data-theme="light"] .form-row textarea{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.1);color:var(--blanc)}

nav{position:fixed;top:0;left:0;width:100%;z-index:100;padding:1rem 3rem;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);background:var(--nav-bg);border-bottom:1px solid var(--border-accent);transition:background .4s}
.nav-logo img{height:32px;width:auto;filter:brightness(1.1)}
.nav-links{display:flex;gap:2.2rem;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;font-weight:500}
.nav-links a{color:var(--gris-texte);transition:color .3s;position:relative;cursor:pointer}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--or);transition:width .3s}
.nav-links a:hover{color:var(--blanc)}.nav-links a:hover::after{width:100%}
.nav-cta{font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;padding:.65rem 1.6rem;border:1px solid var(--or);color:var(--or);transition:all .3s;font-weight:500;cursor:pointer;background:none}
.nav-cta:hover{background:var(--or);color:var(--noir)}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:.5rem}
.hamburger svg{width:24px;height:24px}

.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;padding:6rem 2rem 4rem}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 85%,rgba(107,15,26,.3) 0%,transparent 55%),radial-gradient(ellipse at 80% 20%,rgba(201,168,76,.05) 0%,transparent 45%)}
.hero-tag{font-size:.7rem;letter-spacing:.35em;text-transform:uppercase;color:var(--or);margin-bottom:2.5rem;font-weight:500;opacity:0;animation:fadeUp .8s .3s forwards;display:flex;align-items:center;gap:1rem}
.diamond{width:6px;height:6px;background:var(--or);transform:rotate(45deg);display:inline-block;flex-shrink:0}
.hero h1{font-family:var(--ff-display);font-size:clamp(3rem,8vw,7.5rem);line-height:.95;font-weight:400;margin-bottom:1.8rem;opacity:0;animation:fadeUp .8s .5s forwards;position:relative;z-index:1}
.hero h1 em{font-style:italic;color:var(--or)}
.hero-sub{font-size:1.05rem;color:var(--gris-texte);max-width:500px;line-height:1.75;font-weight:300;opacity:0;animation:fadeUp .8s .7s forwards;position:relative;z-index:1}
.hero-scroll{position:absolute;bottom:2.5rem;display:flex;flex-direction:column;align-items:center;gap:.5rem;opacity:0;animation:fadeUp .8s 1.2s forwards}
.hero-scroll span{font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gris-texte)}
.hero-scroll .line{width:1px;height:45px;background:linear-gradient(to bottom,var(--or),transparent);animation:scrollPulse 2s infinite}

.stats{display:flex;justify-content:center;gap:5rem;padding:3.5rem 2rem;border-top:1px solid rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.01)}
.stat{text-align:center;display:flex;flex-direction:column;align-items:center}
.stat svg{margin-bottom:.6rem;opacity:.35}
.stat-num{font-family:var(--ff-display);font-size:2.6rem;color:var(--or);line-height:1}
.stat-label{font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gris-texte);margin-top:.4rem}

.section-tag{font-size:.65rem;letter-spacing:.35em;text-transform:uppercase;color:var(--or);margin-bottom:1rem;font-weight:500;display:flex;align-items:center;gap:.7rem}
.section-title{font-family:var(--ff-display);font-size:clamp(2rem,4vw,3.2rem);line-height:1.15;margin-bottom:1.5rem}

.about{padding:8rem 3rem;display:grid;grid-template-columns:1fr 1fr;gap:5rem;max-width:1200px;margin:0 auto;align-items:center}
.about p{color:var(--gris-texte);line-height:1.85;font-weight:300;font-size:.92rem;margin-bottom:1.2rem}
.about-visual{position:relative;aspect-ratio:4/5;border-radius:2px;overflow:hidden}
.about-visual img{width:100%;height:100%;object-fit:cover}
.about-visual.no-photo::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--bordeaux),var(--noir));opacity:.65}
.about-visual .av-placeholder{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:1}
.about-visual.no-photo .av-placeholder{display:flex}
.about-visual .av-placeholder svg{opacity:.12}
.av-label{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.2)}

.brands{padding:8rem 3rem;max-width:1400px;margin:0 auto}
.brands-header{text-align:center;margin-bottom:5rem}
.brands-header .section-tag{justify-content:center}
.brands-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;max-width:1100px;margin:0 auto}
.brand-card{position:relative;aspect-ratio:2/3;overflow:hidden;border-radius:3px;cursor:pointer;border:1px solid rgba(255,255,255,.05);transition:border-color .5s,transform .5s}
.brand-card:hover{border-color:rgba(201,168,76,.4);transform:translateY(-8px)}
.brand-bg{position:absolute;inset:0;transition:transform .7s}.brand-card:hover .brand-bg{transform:scale(1.06)}
.brand-content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;padding:2rem}
.brand-icon{margin-bottom:auto}
.brand-icon img{height:50px;width:auto;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))}
.brand-label{font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;color:var(--or);margin-bottom:.5rem}
.brand-name{font-family:var(--ff-display);font-size:1.6rem;margin-bottom:.7rem}
.brand-desc{font-size:.82rem;color:var(--gris-texte);line-height:1.7;font-weight:300;margin-bottom:1.2rem}
.brand-link{font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--or);display:inline-flex;align-items:center;gap:.5rem;transition:gap .3s}
.brand-link svg{width:14px;height:14px;transition:transform .3s}.brand-card:hover .brand-link svg{transform:translateX(4px)}

.djs{padding:8rem 3rem;max-width:1400px;margin:0 auto}
.djs-header{text-align:center;margin-bottom:4rem}
.djs-header .section-tag{justify-content:center}
.djs-header p{color:var(--gris-texte);font-weight:300;font-size:.95rem;max-width:500px;margin:0 auto}
.djs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem}
.dj-card{border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,.04);transition:border-color .4s,transform .4s;cursor:default}
.dj-card:hover{border-color:rgba(201,168,76,.3);transform:translateY(-5px)}
.dj-photo{aspect-ratio:3/4;background:var(--gris);position:relative;overflow:hidden}
.dj-photo img{width:100%;height:100%;object-fit:cover;position:relative;z-index:0}
.dj-photo::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--noir),transparent 50%);z-index:1}
.dj-photo .dj-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.dj-photo .dj-placeholder svg{opacity:.08}
.dj-info{padding:1.2rem 1.4rem}
.dj-name{font-family:var(--ff-display);font-size:1.1rem;margin-bottom:.3rem}
.dj-style{font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--or);font-weight:500}
.dj-venues{font-size:.75rem;color:var(--gris-texte);margin-top:.5rem;font-weight:300;line-height:1.6}
.dj-socials{display:flex;gap:.5rem;margin-top:.7rem}
.dj-socials a{width:28px;height:28px;border:1px solid rgba(255,255,255,.06);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .3s}
.dj-socials a:hover{border-color:var(--or);background:rgba(201,168,76,.1)}
.dj-socials a svg{width:11px;height:11px}
.djs-cta{text-align:center;margin-top:3.5rem}
.djs-cta-btn{display:inline-flex;align-items:center;gap:.6rem;padding:.8rem 2.2rem;border:1px solid rgba(201,168,76,.3);color:var(--or);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;font-weight:500;transition:all .3s;cursor:pointer;background:none}
.djs-cta-btn:hover{background:rgba(201,168,76,.08);border-color:var(--or)}

.trust{padding:6rem 3rem;text-align:center;border-top:1px solid rgba(255,255,255,.04)}
.trust .section-tag{justify-content:center;margin-bottom:3rem}
.trust-logos{display:flex;justify-content:center;align-items:center;gap:3.5rem;flex-wrap:wrap}
.trust-logo{opacity:.25;transition:opacity .4s;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gris-texte)}.trust-logo:hover{opacity:.55}

.cta-section{padding:9rem 3rem;text-align:center;position:relative}
.cta-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(201,168,76,.07) 0%,transparent 55%)}
.cta-section .section-title,.cta-section p,.cta-btn{position:relative}
.cta-section p{color:var(--gris-texte);margin-bottom:2.8rem;font-size:1rem;font-weight:300}
.cta-btn{display:inline-flex;align-items:center;gap:.8rem;padding:1.1rem 3rem;background:var(--or);color:var(--noir);font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;font-weight:700;transition:all .4s;border:none;cursor:pointer}
.cta-btn:hover{background:var(--blanc);transform:translateY(-3px);box-shadow:0 15px 50px rgba(201,168,76,.2)}

/* BRAND MODALS */
.brand-modal{position:fixed;inset:0;z-index:200;background:var(--noir);overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .5s}
.brand-modal.active{opacity:1;pointer-events:all}
.brand-modal-inner{max-width:1100px;margin:0 auto;padding:6rem 3rem 4rem}
.bm-back{position:fixed;top:1.2rem;left:1.5rem;z-index:210;display:flex;align-items:center;gap:.5rem;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gris-texte);cursor:pointer;background:rgba(10,10,10,.8);backdrop-filter:blur(12px);padding:.6rem 1.2rem;border:1px solid rgba(255,255,255,.06);border-radius:2px;transition:all .3s}
.bm-back:hover{color:var(--or);border-color:rgba(201,168,76,.3)}
.bm-back svg{width:16px;height:16px}
.bm-hero{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;margin-bottom:5rem;min-height:70vh;padding-top:2rem}
.bm-tag{font-size:.62rem;letter-spacing:.35em;text-transform:uppercase;color:var(--or);margin-bottom:1rem;font-weight:500}
.bm-hero h2{font-family:var(--ff-display);font-size:clamp(2.2rem,5vw,3.8rem);line-height:1.05;margin-bottom:1.5rem}
.bm-hero h2 em{font-style:italic;color:var(--or)}
.bm-hero p{color:var(--gris-texte);line-height:1.85;font-weight:300;font-size:.95rem;margin-bottom:1rem}
.bm-visual{aspect-ratio:4/5;border-radius:3px;overflow:hidden;position:relative}
.bm-visual img{width:100%;height:100%;object-fit:cover}
.bm-visual .bm-gradient{position:absolute;inset:0}
.bm-visual .bm-placeholder{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:.8rem;z-index:1}
.bm-visual.no-photo .bm-placeholder{display:flex}
.bm-visual .bm-placeholder svg{opacity:.1}
.bm-visual .bm-placeholder span{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.2)}
.bm-features{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;margin-bottom:5rem}
.bm-feature{padding:2rem;border:1px solid rgba(255,255,255,.04);border-radius:3px;transition:border-color .3s}
.bm-feature:hover{border-color:rgba(201,168,76,.15)}
.bm-feature h4{font-family:var(--ff-display);font-size:1.05rem;margin-bottom:.6rem}
.bm-feature p{font-size:.82rem;color:var(--gris-texte);line-height:1.7;font-weight:300}
.bm-stats{display:flex;justify-content:center;gap:4rem;padding:3rem 0;border-top:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.04);margin-bottom:5rem}
.bm-stat-num{font-family:var(--ff-display);font-size:2.2rem;color:var(--or)}
.bm-stat-label{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gris-texte);margin-top:.3rem}
.bm-cta{text-align:center;padding:4rem 0}
.bm-cta h3{font-family:var(--ff-display);font-size:1.8rem;margin-bottom:1rem}
.bm-cta p{color:var(--gris-texte);font-weight:300;margin-bottom:2rem}

/* CONTACT MODAL */
.modal-overlay{position:fixed;inset:0;z-index:250;background:var(--overlay-bg);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal{background:var(--gris);border:1px solid rgba(201,168,76,.12);border-radius:4px;width:90%;max-width:520px;padding:3rem;position:relative;transform:translateY(30px) scale(.97);transition:transform .4s cubic-bezier(.22,1,.36,1)}
.modal-overlay.active .modal{transform:translateY(0) scale(1)}
.modal-close{position:absolute;top:1.2rem;right:1.2rem;width:36px;height:36px;border:1px solid rgba(255,255,255,.08);border-radius:50%;background:none;color:var(--gris-texte);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.modal-close:hover{border-color:var(--or);color:var(--or)}
.modal-close svg{width:16px;height:16px}
.modal h3{font-family:var(--ff-display);font-size:1.6rem;margin-bottom:2rem}
.form-row{margin-bottom:1.2rem}
.form-row label{display:block;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gris-texte);margin-bottom:.5rem;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:2px;padding:.8rem 1rem;color:var(--blanc);font-family:var(--ff-body);font-size:.88rem;font-weight:300;transition:border-color .3s;outline:none}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--or)}
.form-row input::placeholder,.form-row textarea::placeholder{color:rgba(255,255,255,.2)}
.form-row select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' stroke='%23999' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 1rem center;cursor:pointer}
.form-row select option{background:var(--gris);color:var(--blanc)}
.form-row textarea{resize:vertical;min-height:100px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
.form-submit{width:100%;padding:.9rem;background:var(--or);color:var(--noir);font-family:var(--ff-body);font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;font-weight:700;border:none;cursor:pointer;transition:all .3s;margin-top:.5rem;border-radius:2px}
.form-submit:hover{background:var(--blanc)}
.form-success{display:none;text-align:center;padding:2rem 0}
.form-success h4{font-family:var(--ff-display);font-size:1.3rem;margin-bottom:.5rem}
.form-success p{color:var(--gris-texte);font-size:.88rem;font-weight:300}

footer{padding:5rem 3rem 2rem;border-top:1px solid rgba(255,255,255,.05);display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3rem;max-width:1300px;margin:0 auto}
.footer-brand img{height:28px;margin-bottom:1.2rem;filter:brightness(1.1)}
.footer-brand p{font-size:.82rem;color:var(--gris-texte);line-height:1.8;font-weight:300;max-width:260px}
.footer-socials{display:flex;gap:.8rem;margin-top:1.2rem}
.footer-socials a{width:34px;height:34px;border:1px solid rgba(255,255,255,.08);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .3s}
.footer-socials a:hover{border-color:var(--or);background:rgba(201,168,76,.08)}
.footer-socials a svg{width:13px;height:13px}
.footer-col h4{font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:var(--or);margin-bottom:1.2rem;font-weight:500}
.footer-col a{font-size:.82rem;color:var(--gris-texte);line-height:2.2;font-weight:300;display:block;transition:color .3s;cursor:pointer}.footer-col a:hover{color:var(--or)}
.footer-bottom{text-align:center;padding:2.5rem 3rem;font-size:.6rem;color:rgba(255,255,255,.13);letter-spacing:.15em;text-transform:uppercase}

@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes scrollPulse{0%,100%{opacity:.3}50%{opacity:1}}
[data-reveal]{opacity:0;transform:translateY(40px);transition:opacity .8s cubic-bezier(.22,1,.36,1),transform .8s cubic-bezier(.22,1,.36,1)}
[data-reveal].visible{opacity:1;transform:translateY(0)}

@media(max-width:1000px){.brands-grid,.djs-grid{grid-template-columns:repeat(2,1fr)}.brand-card{aspect-ratio:3/4}.bm-hero{grid-template-columns:1fr;gap:2rem}.bm-features{grid-template-columns:1fr 1fr}}
@media(max-width:768px){
  nav{padding:1rem 1.5rem}.nav-links{display:none}.hamburger{display:block}
  .about{grid-template-columns:1fr;gap:2.5rem;padding:5rem 1.5rem}.about-visual{aspect-ratio:16/10}
  .brands{padding:5rem 1.5rem}.brands-grid{grid-template-columns:1fr;gap:1rem}.brand-card{aspect-ratio:5/4}
  .stats{gap:1.5rem;flex-wrap:wrap;padding:2.5rem 1rem}
  .djs{padding:5rem 1.5rem}.djs-grid{grid-template-columns:1fr 1fr;gap:1rem}
  footer{grid-template-columns:1fr 1fr;gap:2rem;padding:3rem 1.5rem}.footer-brand{grid-column:1/-1}
  .hero h1{font-size:clamp(2.5rem,10vw,4rem)}.cta-section{padding:5rem 1.5rem}.trust-logos{gap:2rem}
  .modal{padding:2rem 1.5rem}.form-grid{grid-template-columns:1fr}
  .brand-modal-inner{padding:5rem 1.5rem 3rem}.bm-hero{min-height:auto}.bm-visual{aspect-ratio:16/10}.bm-features{grid-template-columns:1fr}.bm-stats{gap:2rem;flex-wrap:wrap}
}

function photoOrPlaceholder(src, label) {
  const img = new Image();
  img.src = src;
  // We'll use onerror in the HTML to show placeholder
  return `<img src="${src}" alt="${label}" onerror="this.parentElement.classList.add('no-photo');this.style.display='none'">`;
}

function buildSite() {
  const brandKeys = ['events','wedding','nomames'];
  
  document.getElementById('app').innerHTML = `
<!-- NAV -->
<nav>

<!-- HERO -->
<section class="hero">

<!-- STATS -->
<div class="stats" data-reveal>

<!-- ABOUT -->

<footer data-reveal>

<!-- CONTACT MODAL -->
<div class="modal-overlay" id="contactModal" role="dialog" aria-modal="true" aria-label="Formulaire de contact" onclick="if(event.target===this)closeContact()">
  <div class="modal">

        <div class="form-grid"><div class="form-row"><label>Prénom</label><input name="prenom" required placeholder="Votre prénom"></div><div class="form-row"><label>Nom</label><input name="nom" required placeholder="Votre nom"></div></div>
        <div class="form-grid"><div class="form-row"><label>Email</label><input name="email" type="email" required placeholder="votre@email.com"></div><div class="form-row"><label>Téléphone</label><input name="tel" type="tel" placeholder="+33 6 ..."></div></div>
        <div class="form-row"><label>Type de projet</label><select name="type" required><option value="" disabled selected>Sélectionnez...</option><option>Booking DJ — Établissement</option><option>Booking DJ — Événement privé</option><option>Mariage</option><option>Formation DJ</option><option>Direction artistique</option><option>Autre</option></select></div>
        <div class="form-row"><label>Votre message</label><textarea name="message" placeholder="Décrivez votre projet, la date souhaitée, le lieu..."></textarea></div>
        <button type="submit" class="form-submit">Envoyer la demande</button>
      </form>
    </div>

      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5" style="margin:0 auto 1rem;display:block"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/></svg>
      <h4>Message envoyé</h4>
      <p>Nous reviendrons vers vous sous 24h.</p>
    </div>
  </div>
</div>`;

  // Init reveal observer
  const obs = new IntersectionObserver(entries => { entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); obs.unobserve(e.target) }}) }, { threshold: 0.1 });
  document.querySelectorAll('[data-reveal]').forEach(el => obs.observe(el));
}

// ── Modal controllers ──
function openBrand(id){ const el=document.getElementById('bm-'+id); if(el){el.classList.add('active');el.scrollTop=0;document.body.style.overflow='hidden';} }
function closeBrand(id){ const el=document.getElementById('bm-'+id); if(el){el.classList.remove('active');document.body.style.overflow='';} }
function openContact(){ document.getElementById('contactModal').classList.add('active'); document.body.style.overflow='hidden'; }
function closeContact(){ document.getElementById('contactModal').classList.remove('active'); document.body.style.overflow=''; }
document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeContact(); document.querySelectorAll('.brand-modal.active').forEach(m=>m.classList.remove('active')); document.body.style.overflow=''; }});

function submitForm(e) {
  e.preventDefault();
  // TODO: replace with Formspree, EmailJS or Supabase
  // const data = new FormData(e.target);
  // fetch('https://formspree.io/f/YOUR_ID', { method:'POST', body:data });
  document.getElementById('formContent').style.display='none';
  document.getElementById('formSuccess').style.display='block';
  setTimeout(closeContact, 2500);
  setTimeout(() => { document.getElementById('formContent').style.display=''; document.getElementById('formSuccess').style.display='none'; document.getElementById('contactForm').reset(); }, 3000);
  return false;
}

// Theme toggle
const sunIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
const moonIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>`;

function getTheme() {
  const saved = localStorage.getItem('mgr-theme');
  if (saved) return saved;
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : '');
  const icon = document.getElementById('themeIcon');
  if (icon) icon.outerHTML = theme === 'light' ? moonIcon.replace('<svg', '<svg id="themeIcon"') : sunIcon.replace('<svg', '<svg id="themeIcon"');
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('mgr-theme', next);
  applyTheme(next);
}

// Apply saved theme before build
applyTheme(getTheme());

// Build on load
buildSite();

// Re-apply icon after build (DOM rebuilt)
applyTheme(getTheme());
</script>
</body>
</html>
